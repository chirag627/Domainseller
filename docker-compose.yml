version: "3.9"

services:
  app:
    build: .
    container_name: domainseller
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persist the JSON data store so changes survive container restarts
      - ./data:/app/data:ro

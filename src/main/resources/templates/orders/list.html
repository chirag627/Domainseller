<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Orders')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-bag text-primary me-2"></i>My Orders</h2>
    <div th:if="${orders.isEmpty()}" class="text-center py-5 text-secondary">
        <i class="bi bi-bag display-3"></i>
        <h4 class="mt-3">No orders yet</h4>
        <a th:href="@{/domains}" class="btn btn-primary mt-2">Browse Domains</a>
    </div>
    <div th:unless="${orders.isEmpty()}" class="table-responsive">
        <table class="table table-dark-custom">
            <thead><tr><th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td class="text-secondary small" th:text="${#strings.abbreviate(order.id, 12)}"></td>
                    <td th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}"></td>
                    <td th:text="${order.items.size()}"></td>
                    <td class="text-warning fw-bold" th:text="'$' + ${order.totalAmount}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.status.name() == 'COMPLETED'} ? 'bg-success' : (${order.status.name() == 'CANCELLED'} ? 'bg-danger' : (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 'bg-warning text-dark'))"
                              th:text="${order.status}"></span>
                    </td>
                    <td><a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">View</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Page Not Found')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container py-5 text-center">
    <div class="display-1 text-primary fw-bold">404</div>
    <h2 class="mb-3">Page Not Found</h2>
    <p class="text-secondary mb-4" th:text="${error != null ? error : 'The page you are looking for does not exist.'}"></p>
    <a th:href="@{/}" class="btn btn-primary">Go Home</a>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Profile')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-person-circle text-primary me-2"></i>My Profile</h2>
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4">
                <h5 class="mb-3">Edit Profile</h5>
                <form th:action="@{/user/profile}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="fullName" th:value="${user.fullName}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" th:value="${user.email}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:value="${user.username}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password (optional)</label>
                        <input type="password" class="form-control" name="newPassword" placeholder="Leave blank to keep current">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Profile</button>
                </form>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card p-4">
                <h5 class="mb-3">Recent Orders</h5>
                <div th:if="${orders.isEmpty()}" class="text-secondary">No orders yet.</div>
                <div th:unless="${orders.isEmpty()}" class="table-responsive">
                    <table class="table table-dark-custom">
                        <thead><tr><th>Date</th><th>Total</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr th:each="order, orderStat : ${orders}" th:if="${orderStat.count <= 5}">
                                <td th:text="${#temporals.format(order.createdAt, 'MMM dd')}"></td>
                                <td th:text="'$' + ${order.totalAmount}"></td>
                                <td><span class="badge bg-secondary" th:text="${order.status}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Checkout')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>

<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-credit-card text-primary me-2"></i>Checkout</h2>
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card p-4">
                <h5 class="mb-3">Billing Information</h5>
                <form th:action="@{/cart/checkout}" method="post" th:object="${checkoutDto}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" th:field="*{billingName}"
                                   th:classappend="${#fields.hasErrors('billingName')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{billingName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{billingEmail}"
                                   th:classappend="${#fields.hasErrors('billingEmail')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{billingEmail}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" th:field="*{billingAddress}"
                                   th:classappend="${#fields.hasErrors('billingAddress')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{billingAddress}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" th:field="*{billingCity}"
                                   th:classappend="${#fields.hasErrors('billingCity')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{billingCity}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Country</label>
                            <input type="text" class="form-control" th:field="*{billingCountry}"
                                   th:classappend="${#fields.hasErrors('billingCountry')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{billingCountry}"></div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100 btn-lg">
                                <i class="bi bi-lock"></i> Place Order
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card p-4">
                <h5 class="mb-3">Order Summary</h5>
                <div th:each="item : ${cart.items}" class="d-flex justify-content-between mb-2">
                    <span th:text="${item.domainName}"></span>
                    <span class="text-warning" th:text="'$' + ${item.price}"></span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold">
                    <span>Total</span>
                    <span class="text-warning">$<span th:text="${#aggregates.sum(cart.items.![price])}">0</span></span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

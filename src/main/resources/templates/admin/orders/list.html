<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('All Orders')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-bag text-primary me-2"></i>All Orders</h2>
    <div class="table-responsive">
        <table class="table table-dark-custom">
            <thead><tr><th>Date</th><th>User</th><th>Email</th><th>Items</th><th>Total</th><th>Status</th><th>Update Status</th></tr></thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}"></td>
                    <td th:text="${order.userName}"></td>
                    <td class="text-secondary small" th:text="${order.userEmail}"></td>
                    <td th:text="${order.items.size()}"></td>
                    <td class="text-warning fw-bold" th:text="'$' + ${order.totalAmount}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.status.name() == 'COMPLETED'} ? 'bg-success' : (${order.status.name() == 'CANCELLED'} ? 'bg-danger' : (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 'bg-warning text-dark'))"
                              th:text="${order.status}"></span>
                    </td>
                    <td>
                        <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-flex gap-1">
                            <select class="form-select form-select-sm" name="status">
                                <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}"
                                        th:selected="${s == order.status}"></option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary">Set</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

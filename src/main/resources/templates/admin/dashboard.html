<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-speedometer2 text-primary me-2"></i>Admin Dashboard</h2>
    </div>
    <!-- Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-2 col-sm-4">
            <div class="stat-card text-center">
                <div class="fs-2 fw-bold text-primary" th:text="${totalDomains}">0</div>
                <div class="text-secondary small">Total Domains</div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4">
            <div class="stat-card text-center">
                <div class="fs-2 fw-bold text-success" th:text="${availableDomains}">0</div>
                <div class="text-secondary small">Available</div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4">
            <div class="stat-card text-center">
                <div class="fs-2 fw-bold text-info" th:text="${totalUsers}">0</div>
                <div class="text-secondary small">Users</div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4">
            <div class="stat-card text-center">
                <div class="fs-2 fw-bold text-warning" th:text="${totalOrders}">0</div>
                <div class="text-secondary small">Orders</div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4">
            <div class="stat-card text-center">
                <div class="fs-2 fw-bold text-success" th:text="'$' + ${revenue}">$0</div>
                <div class="text-secondary small">Revenue</div>
            </div>
        </div>
        <div class="col-md-2 col-sm-4">
            <div class="stat-card text-center">
                <div class="fs-2 fw-bold text-danger" th:text="${auctionCount}">0</div>
                <div class="text-secondary small">Auctions</div>
            </div>
        </div>
    </div>
    <!-- Quick Links -->
    <div class="row g-3 mb-4">
        <div class="col"><a th:href="@{/admin/domains}" class="btn btn-outline-primary w-100"><i class="bi bi-globe2"></i> Domains</a></div>
        <div class="col"><a th:href="@{/admin/orders}" class="btn btn-outline-warning w-100"><i class="bi bi-bag"></i> Orders</a></div>
        <div class="col"><a th:href="@{/admin/auctions}" class="btn btn-outline-danger w-100"><i class="bi bi-hammer"></i> Auctions</a></div>
        <div class="col"><a th:href="@{/admin/inquiries}" class="btn btn-outline-info w-100"><i class="bi bi-envelope"></i> Inquiries</a></div>
        <div class="col"><a th:href="@{/admin/users}" class="btn btn-outline-secondary w-100"><i class="bi bi-people"></i> Users</a></div>
    </div>
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card p-4">
                <h5 class="mb-3">Recent Orders</h5>
                <div class="table-responsive">
                    <table class="table table-dark-custom table-sm">
                        <thead><tr><th>Date</th><th>User</th><th>Total</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr th:each="o : ${recentOrders}">
                                <td th:text="${#temporals.format(o.createdAt, 'MMM dd')}"></td>
                                <td th:text="${o.userName}"></td>
                                <td th:text="'$' + ${o.totalAmount}"></td>
                                <td><span class="badge bg-secondary" th:text="${o.status}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <a th:href="@{/admin/orders}" class="btn btn-sm btn-outline-primary mt-2">View All</a>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card p-4">
                <h5 class="mb-3">Recent Inquiries</h5>
                <div th:each="inq : ${recentInquiries}" class="mb-2 pb-2 border-bottom border-secondary">
                    <div class="d-flex justify-content-between">
                        <span th:text="${inq.senderName}" class="fw-bold"></span>
                        <span th:if="${inq.replied}" class="badge bg-success small">Replied</span>
                        <span th:unless="${inq.replied}" class="badge bg-warning text-dark small">Pending</span>
                    </div>
                    <div class="text-secondary small" th:text="${inq.domainName}"></div>
                </div>
                <a th:href="@{/admin/inquiries}" class="btn btn-sm btn-outline-info mt-2">View All</a>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Auctions')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-hammer text-primary me-2"></i>Manage Auctions</h2>
        <a th:href="@{/admin/auctions/new}" class="btn btn-primary"><i class="bi bi-plus"></i> New Auction</a>
    </div>
    <div class="table-responsive">
        <table class="table table-dark-custom">
            <thead><tr><th>Domain</th><th>Start</th><th>Current Bid</th><th>Bids</th><th>End Time</th><th>Active</th><th>Action</th></tr></thead>
            <tbody>
                <tr th:each="auction : ${auctions}">
                    <td th:text="${auction.domainName}"></td>
                    <td th:text="'$' + ${auction.startingPrice}"></td>
                    <td class="text-success" th:text="'$' + ${auction.currentBid}"></td>
                    <td th:text="${auction.bids.size()}"></td>
                    <td th:text="${#temporals.format(auction.endTime, 'MMM dd HH:mm')}"></td>
                    <td>
                        <span th:if="${auction.active}" class="badge bg-success">Active</span>
                        <span th:unless="${auction.active}" class="badge bg-secondary">Ended</span>
                    </td>
                    <td th:if="${auction.active}">
                        <form th:action="@{/admin/auctions/{id}/end(id=${auction.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-outline-danger">End Now</button>
                        </form>
                    </td>
                    <td th:unless="${auction.active}">-</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

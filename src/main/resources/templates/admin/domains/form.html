<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${isEdit ? 'Edit Domain' : 'New Domain'})}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container py-4">
    <h2 class="mb-4">
        <i class="bi bi-globe2 text-primary me-2"></i>
        <span th:text="${isEdit ? 'Edit Domain' : 'New Domain'}">Domain</span>
    </h2>
    <div class="row">
        <div class="col-lg-7">
            <div class="card p-4">
                <form th:action="${isEdit ? '/admin/domains/' + domainId : '/admin/domains'}"
                      method="post" th:object="${domainDto}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Domain Name</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="e.g. mydomain"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Extension</label>
                            <input type="text" class="form-control" th:field="*{extension}" placeholder=".com"
                                   th:classappend="${#fields.hasErrors('extension')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{extension}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select class="form-select" th:field="*{category}"
                                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
                                <option value="">Select Category</option>
                                <option th:each="cat : ${categories}" th:value="${cat.name()}" th:text="${cat.name()}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Price ($)</label>
                            <input type="number" class="form-control" th:field="*{price}" step="0.01"
                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{price}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Tags (comma-separated)</label>
                            <input type="text" class="form-control" th:field="*{tags}" placeholder="tech, startup, saas">
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{featured}" id="featuredCheck">
                                <label class="form-check-label" for="featuredCheck">Featured Domain</label>
                            </div>
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i>
                                <span th:text="${isEdit ? 'Update Domain' : 'Create Domain'}"></span>
                            </button>
                            <a th:href="@{/admin/domains}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

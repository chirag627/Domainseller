<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Domain Marketplace')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>

<div class="container py-4">
    <!-- Search Form -->
    <form th:action="@{/domains}" method="get" class="mb-4">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <input type="text" class="form-control" name="q" placeholder="Search domains..." th:value="${q}">
            </div>
            <div class="col-md-2">
                <select class="form-select" name="category">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}" th:value="${cat.name()}" th:text="${cat.name()}"
                            th:selected="${cat.name() == category}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" name="minPrice" placeholder="Min Price" th:value="${minPrice}">
            </div>
            <div class="col-md-2">
                <input type="number" class="form-control" name="maxPrice" placeholder="Max Price" th:value="${maxPrice}">
            </div>
            <div class="col-md-1">
                <select class="form-select" name="sort">
                    <option value="createdAt,desc" th:selected="${sort == 'createdAt,desc'}">Newest</option>
                    <option value="price,asc" th:selected="${sort == 'price,asc'}">Price ↑</option>
                    <option value="price,desc" th:selected="${sort == 'price,desc'}">Price ↓</option>
                    <option value="name,asc" th:selected="${sort == 'name,asc'}">Name A-Z</option>
                </select>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i></button>
            </div>
        </div>
    </form>

    <!-- Results -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">
            <span th:text="${domains.totalElements}">0</span> domains found
        </h5>
    </div>

    <div class="row g-4">
        <div th:each="domain : ${domains.content}" class="col-md-4 col-lg-3">
            <div class="card h-100">
                <div class="card-body">
                    <span class="badge bg-primary mb-2" th:text="${domain.category}">TECH</span>
                    <h6 class="card-title text-primary" th:text="${domain.name + domain.extension}">domain.com</h6>
                    <p class="text-secondary small" th:text="${#strings.abbreviate(domain.description, 80)}"></p>
                    <div class="price-display fs-5" th:text="'$' + ${domain.price}">$0</div>
                    <div class="mt-2">
                        <span th:each="tag : ${domain.tags}" class="badge bg-secondary me-1 small" th:text="${tag}"></span>
                    </div>
                </div>
                <div class="card-footer d-flex gap-1">
                    <a th:href="@{/domains/{id}(id=${domain.id})}" class="btn btn-primary btn-sm flex-fill">Details</a>
                    <form th:action="@{/cart/add}" method="post" sec:authorize="isAuthenticated()">
                        <input type="hidden" name="domainId" th:value="${domain.id}">
                        <button type="submit" class="btn btn-outline-success btn-sm"><i class="bi bi-cart-plus"></i></button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${domains.totalElements == 0}" class="col-12 text-center py-5 text-secondary">
            <i class="bi bi-search display-3"></i>
            <h4 class="mt-3">No domains found</h4>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${domains.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${domains.first} ? 'disabled'">
                <a class="page-link" th:href="@{/domains(q=${q},category=${category},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort},page=${domains.number - 1})}">Previous</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, domains.totalPages - 1)}"
                class="page-item" th:classappend="${i == domains.number} ? 'active'">
                <a class="page-link" th:href="@{/domains(q=${q},category=${category},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort},page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${domains.last} ? 'disabled'">
                <a class="page-link" th:href="@{/domains(q=${q},category=${category},minPrice=${minPrice},maxPrice=${maxPrice},sort=${sort},page=${domains.number + 1})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

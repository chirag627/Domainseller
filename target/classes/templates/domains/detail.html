<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head(${domain.name + domain.extension})}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <span class="badge bg-primary me-2" th:text="${domain.category}">TECH</span>
                        <span th:if="${domain.featured}" class="badge bg-warning text-dark"><i class="bi bi-star-fill"></i> Featured</span>
                    </div>
                    <span class="text-secondary small"><i class="bi bi-eye"></i> <span th:text="${domain.views}">0</span> views</span>
                </div>
                <h1 class="text-primary" th:text="${domain.name + domain.extension}">domain.com</h1>
                <p class="text-secondary" th:text="${domain.description}"></p>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <div class="price-display" th:text="'$' + ${domain.price}">$0</div>
                    </div>
                    <div class="col-md-6 d-flex gap-2 align-items-end">
                        <form th:action="@{/cart/add}" method="post" sec:authorize="isAuthenticated()">
                            <input type="hidden" name="domainId" th:value="${domain.id}">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-cart-plus"></i> Add to Cart</button>
                        </form>
                        <form th:action="@{/domains/{id}/watchlist(id=${domain.id})}" method="post" sec:authorize="isAuthenticated()">
                            <button type="submit" class="btn" th:classappend="${isWatched} ? 'btn-danger' : 'btn-outline-secondary'">
                                <i class="bi" th:classappend="${isWatched} ? 'bi-heart-fill' : 'bi-heart'"></i>
                                <span th:text="${isWatched} ? 'Unwatchlist' : 'Watchlist'">Watchlist</span>
                            </button>
                        </form>
                    </div>
                </div>
                <div class="mt-3">
                    <span th:each="tag : ${domain.tags}" class="badge bg-secondary me-1" th:text="${tag}"></span>
                </div>
            </div>

            <!-- Price History -->
            <div class="card p-4 mb-4" th:if="${not #lists.isEmpty(domain.priceHistory)}">
                <h5 class="mb-3"><i class="bi bi-graph-up text-primary me-2"></i>Price History</h5>
                <table class="table table-dark-custom">
                    <thead><tr><th>Date</th><th>Price</th><th>Note</th></tr></thead>
                    <tbody>
                        <tr th:each="ph : ${domain.priceHistory}">
                            <td th:text="${#temporals.format(ph.changedAt, 'MMM dd, yyyy')}"></td>
                            <td th:text="'$' + ${ph.price}"></td>
                            <td th:text="${ph.note}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Inquiry Form -->
            <div class="card p-4">
                <h5 class="mb-3"><i class="bi bi-envelope text-primary me-2"></i>Contact Seller</h5>
                <form th:action="@{/domains/{id}/inquiry(id=${domain.id})}" method="post" th:object="${inquiryDto}">
                    <input type="hidden" th:field="*{domainId}">
                    <input type="hidden" th:field="*{domainName}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="Your Name" th:field="*{senderName}" required>
                        </div>
                        <div class="col-md-6">
                            <input type="email" class="form-control" placeholder="Your Email" th:field="*{senderEmail}" required>
                        </div>
                        <div class="col-12">
                            <textarea class="form-control" rows="3" placeholder="Your message..." th:field="*{message}" required></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Send Inquiry</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Sidebar: Related Domains -->
        <div class="col-lg-4">
            <div class="sidebar-filter mb-4">
                <h6 class="text-secondary mb-3">Domain Info</h6>
                <ul class="list-unstyled text-secondary">
                    <li class="mb-2"><strong>Extension:</strong> <span th:text="${domain.extension}"></span></li>
                    <li class="mb-2"><strong>Category:</strong> <span th:text="${domain.category}"></span></li>
                    <li class="mb-2"><strong>Listed:</strong> <span th:text="${#temporals.format(domain.createdAt, 'MMM dd, yyyy')}"></span></li>
                    <li class="mb-2"><strong>Status:</strong>
                        <span th:if="${domain.available}" class="text-success">Available</span>
                        <span th:unless="${domain.available}" class="text-danger">Sold</span>
                    </li>
                </ul>
            </div>
            <div th:if="${not #lists.isEmpty(relatedDomains)}">
                <h6 class="text-secondary mb-3">Related Domains</h6>
                <div th:each="rd : ${relatedDomains}" class="card mb-2 p-2">
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/domains/{id}(id=${rd.id})}" class="text-primary" th:text="${rd.name + rd.extension}">domain.com</a>
                        <span class="text-warning" th:text="'$' + ${rd.price}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

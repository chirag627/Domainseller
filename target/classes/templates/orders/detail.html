<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Order Details')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-receipt text-primary me-2"></i>Order Details</h2>
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-4 mb-4">
                <div class="d-flex justify-content-between mb-3">
                    <h5>Order #<span th:text="${order.id}"></span></h5>
                    <span class="badge"
                          th:classappend="${order.status.name() == 'COMPLETED'} ? 'bg-success' : (${order.status.name() == 'CANCELLED'} ? 'bg-danger' : (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 'bg-warning text-dark'))"
                          th:text="${order.status}"></span>
                </div>
                <table class="table table-dark-custom">
                    <thead><tr><th>Domain</th><th>Price</th></tr></thead>
                    <tbody>
                        <tr th:each="item : ${order.items}">
                            <td th:text="${item.domainName}"></td>
                            <td class="text-warning" th:text="'$' + ${item.price}"></td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr><td><strong>Total</strong></td><td class="text-warning fw-bold" th:text="'$' + ${order.totalAmount}"></td></tr>
                    </tfoot>
                </table>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card p-4">
                <h6 class="mb-3">Billing Info</h6>
                <p class="mb-1" th:text="${order.billingName}"></p>
                <p class="mb-1 text-secondary" th:text="${order.billingEmail}"></p>
                <p class="mb-1 text-secondary" th:text="${order.billingAddress}"></p>
                <p class="mb-1 text-secondary" th:text="${order.billingCity + ', ' + order.billingCountry}"></p>
                <hr>
                <p class="text-secondary small">Ordered: <span th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy HH:mm')}"></span></p>
            </div>
        </div>
    </div>
    <a th:href="@{/orders}" class="btn btn-outline-secondary mt-3"><i class="bi bi-arrow-left"></i> Back to Orders</a>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

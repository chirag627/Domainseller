<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Active Auctions')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-hammer text-primary me-2"></i>Active Auctions</h2>
    <div th:if="${auctions.isEmpty()}" class="text-center py-5 text-secondary">
        <i class="bi bi-hammer display-3"></i>
        <h4 class="mt-3">No active auctions</h4>
    </div>
    <div class="row g-4" th:unless="${auctions.isEmpty()}">
        <div th:each="auction : ${auctions}" class="col-md-4">
            <div class="card h-100 auction-card">
                <div class="card-body">
                    <h5 class="text-primary" th:text="${auction.domainName}">domain.com</h5>
                    <div class="mb-2">
                        <small class="text-secondary">Starting:</small>
                        <span class="text-warning ms-2" th:text="'$' + ${auction.startingPrice}"></span>
                    </div>
                    <div class="mb-3">
                        <small class="text-secondary">Current Bid:</small>
                        <span class="fw-bold text-success ms-2 fs-5" th:text="'$' + ${auction.currentBid}"></span>
                    </div>
                    <div th:if="${auction.highestBidderName != null}" class="mb-2 text-secondary small">
                        Highest: <span th:text="${auction.highestBidderName}"></span>
                    </div>
                    <div class="mb-2">
                        <small class="text-secondary">Ends in:</small>
                        <span class="countdown-timer ms-2" th:attr="data-end-time=${auction.endTime}">Loading...</span>
                    </div>
                    <div class="text-secondary small" th:text="${auction.bids.size() + ' bids'}"></div>
                </div>
                <div class="card-footer">
                    <a th:href="@{/auctions/{id}(id=${auction.id})}" class="btn btn-primary w-100">View &amp; Bid</a>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Auction')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card p-4">
                <h2 class="text-primary mb-3" th:text="${auction.domainName}">domain.com</h2>
                <div class="row mb-4">
                    <div class="col-6">
                        <div class="text-secondary small">Starting Price</div>
                        <div class="fs-5" th:text="'$' + ${auction.startingPrice}"></div>
                    </div>
                    <div class="col-6">
                        <div class="text-secondary small">Current Bid</div>
                        <div class="fs-3 fw-bold text-success" th:text="'$' + ${auction.currentBid}"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <span class="text-secondary">Time Remaining: </span>
                    <span class="countdown-timer ms-2 fs-5" th:attr="data-end-time=${auction.endTime}">Loading...</span>
                </div>
                <div th:if="${auction.highestBidderName != null}" class="mb-3 text-secondary">
                    Highest Bidder: <strong th:text="${auction.highestBidderName}"></strong>
                </div>

                <!-- Bid Form -->
                <div sec:authorize="isAuthenticated()" class="mt-3">
                    <h6>Place Your Bid</h6>
                    <form th:action="@{/auctions/{id}/bid(id=${auction.id})}" method="post" class="d-flex gap-2">
                        <input type="number" class="form-control" name="amount" step="0.01"
                               th:placeholder="'Enter amount > $' + ${auction.currentBid}" required>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-hammer"></i> Bid
                        </button>
                    </form>
                </div>
                <div sec:authorize="!isAuthenticated()" class="mt-3">
                    <a th:href="@{/auth/login}" class="btn btn-outline-primary">Login to Place a Bid</a>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card p-4">
                <h5 class="mb-3">Bid History (<span th:text="${auction.bids.size()}">0</span> bids)</h5>
                <div class="bid-history">
                    <div th:each="bid : ${auction.bids}" class="d-flex justify-content-between mb-2 py-2 border-bottom border-secondary">
                        <div>
                            <div class="fw-bold" th:text="${bid.bidderName}"></div>
                            <div class="text-secondary small" th:text="${#temporals.format(bid.placedAt, 'MMM dd, HH:mm')}"></div>
                        </div>
                        <div class="text-success fw-bold" th:text="'$' + ${bid.amount}"></div>
                    </div>
                    <div th:if="${auction.bids.isEmpty()}" class="text-secondary text-center py-3">No bids yet. Be the first!</div>
                </div>
            </div>
        </div>
    </div>
    <a th:href="@{/auctions}" class="btn btn-outline-secondary mt-4"><i class="bi bi-arrow-left"></i> Back to Auctions</a>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

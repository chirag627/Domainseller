<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Watchlist')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-heart text-danger me-2"></i>My Watchlist</h2>
    <div th:if="${watchedDomains.isEmpty()}" class="text-center py-5 text-secondary">
        <i class="bi bi-heart display-3"></i>
        <h4 class="mt-3">Your watchlist is empty</h4>
        <a th:href="@{/domains}" class="btn btn-primary mt-2">Browse Domains</a>
    </div>
    <div class="row g-4" th:unless="${watchedDomains.isEmpty()}">
        <div th:each="domain : ${watchedDomains}" class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <span class="badge bg-primary mb-2" th:text="${domain.category}"></span>
                    <h6 class="text-primary" th:text="${domain.name + domain.extension}">domain.com</h6>
                    <p class="text-secondary small" th:text="${domain.description}"></p>
                    <div class="price-display fs-5" th:text="'$' + ${domain.price}">$0</div>
                </div>
                <div class="card-footer d-flex gap-2">
                    <a th:href="@{/domains/{id}(id=${domain.id})}" class="btn btn-primary btn-sm flex-fill">View</a>
                    <form th:action="@{/domains/{id}/watchlist(id=${domain.id})}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-heart-fill"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

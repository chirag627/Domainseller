<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="bi bi-globe2"></i> DomainSeller Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/domains}"><i class="bi bi-search"></i> Marketplace</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/auctions}"><i class="bi bi-hammer"></i> Auctions</a></li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}">
                        <i class="bi bi-cart3"></i> Cart
                        <span class="badge bg-primary rounded-pill" th:if="${cartItemCount != null and cartItemCount > 0}" th:text="${cartItemCount}"></span>
                    </a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle"></i> <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/user/profile}"><i class="bi bi-person"></i> Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/orders}"><i class="bi bi-bag"></i> My Orders</a></li>
                        <li><a class="dropdown-item" th:href="@{/user/watchlist}"><i class="bi bi-heart"></i> Watchlist</a></li>
                        <li sec:authorize="hasRole('ADMIN')"><hr class="dropdown-divider"></li>
                        <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item text-warning" th:href="@{/admin}"><i class="bi bi-speedometer2"></i> Admin</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right"></i> Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-primary btn-sm ms-2" th:href="@{/auth/register}">Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>

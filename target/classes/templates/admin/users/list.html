<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Users')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-people text-primary me-2"></i>All Users</h2>
    <div class="table-responsive">
        <table class="table table-dark-custom">
            <thead><tr><th>Username</th><th>Full Name</th><th>Email</th><th>Role</th><th>Active</th><th>Joined</th></tr></thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td class="text-secondary" th:text="${u.email}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${u.role == 'ROLE_ADMIN'} ? 'bg-danger' : 'bg-primary'"
                              th:text="${u.role}"></span>
                    </td>
                    <td>
                        <span th:if="${u.active}" class="badge bg-success">Active</span>
                        <span th:unless="${u.active}" class="badge bg-secondary">Inactive</span>
                    </td>
                    <td th:text="${#temporals.format(u.createdAt, 'MMM dd, yyyy')}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

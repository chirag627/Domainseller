<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Domains')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-globe2 text-primary me-2"></i>Manage Domains</h2>
        <a th:href="@{/admin/domains/new}" class="btn btn-primary"><i class="bi bi-plus"></i> Add Domain</a>
    </div>
    <div class="table-responsive">
        <table class="table table-dark-custom">
            <thead>
                <tr><th>Name</th><th>Category</th><th>Price</th><th>Featured</th><th>Available</th><th>Views</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="domain : ${domains}">
                    <td>
                        <a th:href="@{/domains/{id}(id=${domain.id})}" class="text-primary"
                           th:text="${domain.name + domain.extension}">domain.com</a>
                    </td>
                    <td><span class="badge bg-secondary" th:text="${domain.category}"></span></td>
                    <td class="text-warning" th:text="'$' + ${domain.price}"></td>
                    <td>
                        <span th:if="${domain.featured}" class="badge bg-warning text-dark">Yes</span>
                        <span th:unless="${domain.featured}" class="text-secondary">No</span>
                    </td>
                    <td>
                        <span th:if="${domain.available}" class="badge bg-success">Yes</span>
                        <span th:unless="${domain.available}" class="badge bg-danger">No</span>
                    </td>
                    <td th:text="${domain.views}"></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/admin/domains/{id}/edit(id=${domain.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/admin/domains/{id}/toggle(id=${domain.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-toggle-on"></i></button>
                            </form>
                            <form th:action="@{/admin/domains/{id}/delete(id=${domain.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        data-confirm="Delete this domain?"><i class="bi bi-trash"></i></button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Inquiries')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-envelope text-primary me-2"></i>All Inquiries</h2>
    <div class="table-responsive">
        <table class="table table-dark-custom">
            <thead><tr><th>Date</th><th>Domain</th><th>From</th><th>Email</th><th>Message</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
                <tr th:each="inq : ${inquiries}">
                    <td th:text="${#temporals.format(inq.createdAt, 'MMM dd')}"></td>
                    <td th:text="${inq.domainName}"></td>
                    <td th:text="${inq.senderName}"></td>
                    <td class="text-secondary small" th:text="${inq.senderEmail}"></td>
                    <td class="text-secondary small" th:text="${#strings.abbreviate(inq.message, 50)}"></td>
                    <td>
                        <span th:if="${inq.replied}" class="badge bg-success">Replied</span>
                        <span th:unless="${inq.replied}" class="badge bg-warning text-dark">Pending</span>
                    </td>
                    <td th:unless="${inq.replied}">
                        <form th:action="@{/admin/inquiries/{id}/mark-replied(id=${inq.id})}" method="post">
                            <button type="submit" class="btn btn-sm btn-outline-success">Mark Replied</button>
                        </form>
                    </td>
                    <td th:if="${inq.replied}">-</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

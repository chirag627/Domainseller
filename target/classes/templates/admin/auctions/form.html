<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Create Auction')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<div class="container py-4">
    <h2 class="mb-4"><i class="bi bi-hammer text-primary me-2"></i>Create Auction</h2>
    <div class="row">
        <div class="col-lg-6">
            <div class="card p-4">
                <form th:action="@{/admin/auctions}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Select Domain</label>
                        <select class="form-select" name="domainId" required>
                            <option value="">Select a domain...</option>
                            <option th:each="domain : ${domains}" th:value="${domain.id}"
                                    th:text="${domain.name + domain.extension + ' ($' + domain.price + ')'}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Starting Price ($)</label>
                        <input type="number" class="form-control" name="startingPrice" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End Date/Time</label>
                        <input type="datetime-local" class="form-control" name="endTime" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-hammer"></i> Create Auction</button>
                        <a th:href="@{/admin/auctions}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
